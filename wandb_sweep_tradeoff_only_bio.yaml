# W&B sweep: tradeoff-focused RMU search (Qwen2.5), bio-only MMLU subsets.

program: run_rmu_with_eval.py
method: random
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --use_wandb
  - --skip_medmcqa_eval
  - --skip_baseline_eval
  - ${args_no_boolean_flags}
metric:
  name: retain_acc_mmlu
  goal: maximize

parameters:
  lr:
    distribution: log_uniform_values
    min: 2e-5
    max: 8e-4

  alpha:
    distribution: categorical
    values: ["2.5", "5", "10", "20", "35", "50", "70", "90", "300"]

  steering_coeffs:
    distribution: categorical
    values: ["8", "10", "12", "16", "20", "24", "28"]

  max_num_batches:
    distribution: categorical
    values: [120, 150, 200]

  checkpoint_interval:
    value: 20

  batch_size:
    value: 4
  layer_id:
    value: 7
  layer_ids:
    value: "5,6,7"
  param_ids:
    distribution: categorical
    values: ["9", "7,8,9"]

  mmlu_eval_config:
    value: "college_medicine,college_biology,high_school_biology,virology"

  wandb_project:
    value: "rmu-unlearning-tradeoff"

  output_dir:
    value: "outputs/rmu_sweep_tradeoff_only_bio"
  model_name_or_path:
    value: "Qwen/Qwen2.5-7B-Instruct"
  forget_corpora:
    value: "bio-forget-corpus"
  retain_corpora:
    value: "mmlu-auxiliary-all"
